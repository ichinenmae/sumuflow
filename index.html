      <label>
        金額
        <input id="entryAmount" name="amount" required type="number" min="0" step="1" inputmode="numeric">
      </label>
      <label>
        日付
        <input id="entryDate" name="date" required type="date">
        <span class="field-note">土日祝など銀行休業日の前後は、実際の入金日・支払日を確認してください。</span>
